<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>306 医学考点编辑闭环 Demo</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">306 考研医学 · 生理学</p>
            <h1>考点笔记与诊断题编辑闭环</h1>
          </div>
          <button class="icon-button" id="restartBtn" type="button" title="重新开始">↻</button>
        </header>

        <div class="status-strip">
          <div class="status-item">
            <span>当前阶段</span>
            <strong id="stageLabel">笔记学习</strong>
          </div>
          <div class="status-item">
            <span>模板进度</span>
            <strong id="progressLabel">0/3</strong>
          </div>
          <div class="status-item">
            <span>学生画像</span>
            <strong id="profileLabel">未测</strong>
          </div>
        </div>

        <section class="main-panel" id="mainPanel" aria-live="polite"></section>
      </section>

      <aside class="inspector">
        <section class="inspector-section" data-collapsible-section>
          <button class="inspector-toggle" type="button" aria-expanded="true">
            <span>学习流程</span>
            <span class="toggle-mark">⌄</span>
          </button>
          <div class="inspector-content">
          <div class="flowchart">
            <div class="flow-node">章节笔记</div>
            <div class="flow-arrow">学完 ↓</div>
            <div class="flow-node">2 题巩固测试</div>
            <div class="flow-split">
              <div><span>通过</span><strong>进入下一部分</strong></div>
              <div><span>未通过</span><strong>错因分析 + 回跳笔记</strong></div>
            </div>
            <div class="flow-arrow">三部分完成 ↓</div>
            <div class="flow-node hard">混合总结题</div>
          </div>
          </div>
        </section>

        <section class="inspector-section" data-collapsible-section>
          <button class="inspector-toggle" type="button" aria-expanded="true">
            <span>本节结构</span>
            <span class="toggle-mark">⌄</span>
          </button>
          <div class="inspector-content">
          <ol class="flow-list" id="sectionList"></ol>
          </div>
        </section>

        <section class="inspector-section" data-collapsible-section>
          <button class="inspector-toggle" type="button" aria-expanded="true">
            <span>学生画像</span>
            <span class="toggle-mark">⌄</span>
          </button>
          <div class="inspector-content">
          <div class="tag-grid" id="tagGrid"><span>未测</span></div>
          </div>
        </section>

        <section class="inspector-section" data-collapsible-section>
          <button class="inspector-toggle" type="button" aria-expanded="true">
            <span>错题笔记</span>
            <span class="toggle-mark">⌄</span>
          </button>
          <div class="inspector-content">
          <div class="note-log" id="wrongNoteLog">
            <p>错题加入笔记后会出现在这里，学生可在笔记页继续编辑。</p>
          </div>
          </div>
        </section>

        <section class="inspector-section" data-collapsible-section>
          <button class="inspector-toggle" type="button" aria-expanded="true">
            <span>复盘</span>
            <span class="toggle-mark">⌄</span>
          </button>
          <div class="inspector-content">
          <div class="review-log" id="reviewLog">
            <p>完成测试后，这里会记录每一步诊断。</p>
          </div>
          </div>
        </section>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
